<!DOCTYPE html>
<html>
<head>
  <title>Advanced Account Book</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; }
    input, select, button { padding: 8px; margin: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    .income { color: green; font-weight: bold; }
    .expense { color: red; font-weight: bold; }
    .summary { margin-top: 15px; padding: 10px; background: #fafafa; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>📒 Advanced Account Book</h2>

<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">

<select id="type">
  <option value="income">Income</option>
  <option value="expense">Expense</option>
</select>

<button onclick="addEntry()">Add</button>

<div class="summary">
  <p>💰 Income: <span id="income">0</span></p>
  <p>💸 Expense: <span id="expense">0</span></p>
  <h3>⚖️ Balance: <span id="balance">0</span></h3>
</div>

<table>
  <thead>
    <tr>
      <th>Description</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("accounts")) || [];

function saveData() {
  localStorage.setItem("accounts", JSON.stringify(data));
}

function addEntry() {
  let desc = document.getElementById("desc").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let type = document.getElementById("type").value;

  if (!desc || !amount) return;

  data.push({ id: Date.now(), desc, amount, type });

  saveData();
  render();

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

function deleteEntry(id) {
  data = data.filter(item => item.id !== id);
  saveData();
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let income = 0;
  let expense = 0;

  data.forEach(item => {
    if (item.type === "income") income += item.amount;
    else expense += item.amount;

    list.innerHTML += `
      <tr>
        <td>${item.desc}</td>
        <td class="${item.type}">${item.type}</td>
        <td>${item.amount}</td>
        <td><button onclick="deleteEntry(${item.id})">❌</button></td>
      </tr>
    `;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("balance").innerText = income - expense;
}

render();
</script>

</body>
</html>
