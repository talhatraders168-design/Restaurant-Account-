<html>
<head>
  <title>Simple Finance App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    input, select, button { padding: 8px; margin: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>

<h2>📒 Finance App</h2>

<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">
<select id="type">
  <option value="income">Income</option>
  <option value="expense">Expense</option>
</select>
<button onclick="add()">Add</button>

<button onclick="pdf()">Download PDF</button>

<canvas id="chart"></canvas>

<table>
  <thead>
    <tr>
      <th>Description</th>
      <th>Type</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function add(){
  data.push({
    desc: desc.value,
    amount: +amount.value,
    type: type.value,
    date: new Date().toISOString()
  });

  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function render(){
  list.innerHTML = "";

  data.forEach(d=>{
    list.innerHTML += `<tr>
      <td>${d.desc}</td>
      <td>${d.type}</td>
      <td>${d.amount}</td>
    </tr>`;
  });

  chartRender();
}

function chartRender(){
  let months = {};

  data.forEach(d=>{
    let m = d.date.slice(0,7);
    if(!months[m]) months[m] = {i:0,e:0};

    if(d.type=="income") months[m].i += d.amount;
    else months[m].e += d.amount;
  });

  let keys = Object.keys(months);

  new Chart(chart, {
    type: "line",
    data: {
      labels: keys,
      datasets: [
        { label:"Income", data: keys.map(k=>months[k].i), borderColor:"green" },
        { label:"Expense", data: keys.map(k=>months[k].e), borderColor:"red" }
      ]
    }
  });
}

function pdf(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let y = 10;
  doc.text("Finance Report",10,y);

  data.forEach(d=>{
    y += 10;
    doc.text(`${d.desc} | ${d.type} | ${d.amount}`,10,y);
  });

  doc.save("report.pdf");
}

render();
</script>

</script>
</body>
</html>
