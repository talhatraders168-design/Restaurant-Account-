<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken House - Restaurant Account</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#d62828;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:90%;
    margin:auto;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    background:#198754;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th,table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#198754;
    color:white;
}
</style>

</head>
<body>

<header>
<h2>Chicken House Restaurant</h2>
<h4>Daily Sales Account</h4>
</header>

<div class="container">

<div class="card">

<label>তারিখ</label>
<input type="date" id="date">

<label>খাবারের নাম</label>
<input type="text" id="item" placeholder="Chicken Burger">

<label>পরিমাণ</label>
<input type="number" id="qty">

<label>মূল্য</label>
<input type="number" id="price">

<button onclick="saveData()">Save</button>

</div>

<table id="table">

<tr>
<th>Date</th>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

</table>

</div>

<script>

function saveData(){

let date=document.getElementById("date").value;
let item=document.getElementById("item").value;
let qty=document.getElementById("qty").value;
let price=document.getElementById("price").value;

let total=qty*price;

let table=document.getElementById("table");

let row=table.insertRow();

row.insertCell(0).innerHTML=date;
row.insertCell(1).innerHTML=item;
row.insertCell(2).innerHTML=qty;
row.insertCell(3).innerHTML=price;
row.insertCell(4).innerHTML=total;

}

</script>

</body>
</html>
